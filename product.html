<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eagle Retro Jerseys | Product</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans flex flex-col min-h-screen">
    <nav id="main-nav"></nav>
    <main class="flex-grow p-8">
        <button onclick="history.back()" class="mb-8 text-xs uppercase tracking-widest text-zinc-500 hover:text-white transition">← Back</button>
        <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-16 items-start">
            <div class="img-wrapper border border-zinc-800"><img id="detail-img" src=""></div>
            <div class="details">
                <h2 id="detail-name" class="text-5xl font-black mb-2 uppercase tracking-tighter"></h2>
                <p id="detail-price" class="text-2xl mb-4 text-zinc-400 font-mono"></p>
                <div class="mb-6">
                    <p class="text-xs font-bold uppercase tracking-widest mb-3">Select Size</p>
                    <div class="flex gap-2">
                        <button onclick="selectSize('S')" class="size-btn border border-zinc-800 px-4 py-2 hover:border-white transition-colors">S</button>
                        <button onclick="selectSize('M')" class="size-btn border border-zinc-800 px-4 py-2 hover:border-white transition-colors">M</button>
                        <button onclick="selectSize('L')" class="size-btn border border-zinc-800 px-4 py-2 hover:border-white transition-colors">L</button>
                        <button onclick="selectSize('XL')" class="size-btn border border-zinc-800 px-4 py-2 hover:border-white transition-colors">XL</button>
                    </div>
                </div>
                <div class="mb-8">
                    <p class="text-xs font-bold uppercase tracking-widest mb-3">Quantity</p>
                    <input type="number" id="item-qty" value="1" min="1" class="bg-black border border-zinc-800 p-2 w-24 outline-none focus:border-white text-white">
                </div>
                <button onclick="handleAddToCart()" class="bg-white text-black px-12 py-4 font-black hover:bg-zinc-300 w-full transition-colors">ADD TO BAG</button>
            </div>
        </div>
    </main>
    <footer id="main-footer"></footer>
    <script src="script.js"></script>
    <script>
        initCommon();
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) loadProductPage(id);
    </script>
</body>
</html>
