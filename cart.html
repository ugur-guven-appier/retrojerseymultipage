<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eagle Retro Jerseys | Cart</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans flex flex-col min-h-screen">
    <nav id="main-nav"></nav>
    <main class="flex-grow p-8 max-w-xl mx-auto w-full">
        <h2 class="text-4xl font-black mb-10 italic">YOUR ORDER</h2>
        <div id="cart-items" class="mb-10 space-y-4"></div>
        <div class="border-t border-zinc-800 pt-4 mb-8 flex justify-between items-center">
            <span class="text-xl font-bold tracking-widest">TOTAL</span>
            <span id="cart-total-amount" class="text-2xl font-mono font-black text-white">$0</span>
        </div>
        <div id="checkout-form" class="bg-zinc-900 p-8 border border-zinc-800">
            <h3 class="text-sm font-bold mb-6 text-zinc-400 tracking-widest uppercase">Payment Details</h3>
            <div class="space-y-4">
                <input type="text" placeholder="CARD NUMBER" class="checkout-input">
                <div class="flex gap-4"><input type="text" placeholder="MM/YY" class="checkout-input w-1/2"><input type="text" placeholder="CVV" class="checkout-input w-1/2"></div>
                <button onclick="handlePurchase()" class="w-full bg-white text-black py-4 font-black mt-4 hover:bg-zinc-200">CONFIRM PURCHASE</button>
            </div>
        </div>
    </main>
    <footer id="main-footer"></footer>
    <script src="script.js"></script>
    <script>initCommon(); renderCartPage();</script>
</body>
</html>
